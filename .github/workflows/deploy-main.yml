name: Deploy WhatsApp verify (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: wa-verify-deploy-main
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image owner (lowercase)
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # O build costuma passar; falhas 502 Bad Gateway no push ao GHCR são transitórias.
      - name: Build e push receiver (retry em falha de registry)
        env:
          IMAGE: ghcr.io/${{ env.IMAGE_OWNER }}/wa-verify-receiver
        run: |
          set -e
          for attempt in 1 2 3 4; do
            echo "=== Tentativa ${attempt}/4: build + push ==="
            if docker buildx build \
              --file ./app/Dockerfile \
              --push \
              --tag "${IMAGE}:latest" \
              --tag "${IMAGE}:main" \
              ./app; then
              echo "Push concluído."
              exit 0
            fi
            if [ "$attempt" -lt 4 ]; then
              wait=$((45 * attempt))
              echo "Falha no push (ex.: GHCR 502). Nova tentativa em ${wait}s..."
              sleep "$wait"
            fi
          done
          echo "Push falhou após 4 tentativas."
          exit 1

      # Atualiza só a secção receiver no compose da VPS (sem pasta app/).
      - name: Copiar docker-compose.yml para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /opt/wa-verify/
          overwrite: true

      - name: Deploy receiver na VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          command_timeout: 25m
          envs: GHCR_PULL_TOKEN
          script: |
            set -e
            cd /opt/wa-verify
            if [ -n "$GHCR_PULL_TOKEN" ]; then
              echo "$GHCR_PULL_TOKEN" | docker login ghcr.io -u ${{ env.IMAGE_OWNER }} --password-stdin
            fi
            docker compose pull receiver
            docker compose up -d --force-recreate receiver
            docker exec wa-verify-receiver-1 grep -q handleLocationEcho /app/server.js \
              && echo "Receiver OK (location-echo presente)" \
              || (echo "AVISO: server.js sem handleLocationEcho" && exit 1)
