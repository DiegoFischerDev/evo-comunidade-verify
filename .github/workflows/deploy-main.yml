name: Deploy WhatsApp verify (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image owner (lowercase)
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push receiver
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/wa-verify-receiver:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/wa-verify-receiver:main

      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          command_timeout: 25m
          script: |
            set -e
            cd /opt/wa-verify
            if [ -d .git ]; then
              git pull --ff-only origin main
            else
              echo "AVISO: /opt/wa-verify sem .git — atualiza docker-compose.yml à mão"
            fi
            echo "=== imagem Evolution no compose ==="
            grep -E 'image:.*evolution-api' docker-compose.yml deploy/docker-compose.vps.yml 2>/dev/null || grep 'image:.*evolution-api' docker-compose.yml
            docker compose pull receiver evolution
            docker compose up -d --force-recreate evolution receiver
            echo "=== versão em execução (GET /) ==="
            curl -sf http://127.0.0.1:18080/ | head -c 400 || echo "curl falhou"
            echo ""
            docker compose ps evolution receiver

