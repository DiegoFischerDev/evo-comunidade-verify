# VPS (sem nginx no container). O nginx do host faz proxy para as portas locais.
# Evolution v2.x: Redis oficial = CACHE_REDIS_* (REDIS_URI sozinho costuma dar "redis disconnected").

services:
  evolution_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD}
      POSTGRES_DB: evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 5s
      timeout: 5s
      retries: 10

  evolution_redis:
    image: redis:7-alpine
    restart: unless-stopped

  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    restart: unless-stopped
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_DB_PASSWORD}@evolution_db:5432/evolution?schema=public

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://evolution_redis:6379/6
      CACHE_REDIS_PREFIX_KEY: evolution

      WEBHOOK_GLOBAL_URL: ${WEBHOOK_PUBLIC_URL}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      DEFAULT_INSTANCE: ${EVOLUTION_INSTANCE:-comunidade}
    depends_on:
      evolution_db:
        condition: service_healthy
      evolution_redis:
        condition: service_started
    ports:
      - "127.0.0.1:18080:8080"
    volumes:
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances

  receiver:
    build:
      context: ../app
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3100
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      COMMUNITY_API_URL: ${COMMUNITY_API_URL}
      COMMUNITY_INTERNAL_SECRET: ${COMMUNITY_INTERNAL_SECRET}
      IA_APP_BASE_URL: "${IA_APP_BASE_URL:-https://ia.rafaapelomundo.com}"
      IA_APP_INTEGRATION_SECRET: ${IA_APP_INTEGRATION_SECRET}
    ports:
      - "127.0.0.1:13100:3100"

volumes:
  evolution_store:
  evolution_instances:
  evolution_db_data:
